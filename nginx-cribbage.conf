# Replace YOUR-NAME with your DuckDNS subdomain (e.g. myfamily-cribbage)
# Certbot will fill in the ssl_certificate lines automatically when you run:
#   sudo certbot --nginx -d YOUR-NAME.duckdns.org

server {
    listen 80;
    server_name YOUR-NAME.duckdns.org;

    # Certbot uses this for ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR-NAME.duckdns.org;

    # Certbot will populate these:
    # ssl_certificate     /etc/letsencrypt/live/YOUR-NAME.duckdns.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR-NAME.duckdns.org/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /home/pi/cribbage-app/static/;
        expires 7d;
    }
}
